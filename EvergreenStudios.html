   <section class="stats-panel">
      <h2>Add a stat for Evergreen Studios</h2>
      <form class="stat-form" data-source="Evergreen Studios">
         <label>
            Metric
            <input type="text" name="metric" placeholder="e.g. Story Depth" required>
         </label>
         <label>
            Value
            <input type="number" name="value" min="0" step="1" placeholder="e.g. 8" required>
         </label>
         <label>
            Notes
            <textarea name="notes" rows="3" placeholder="Add context for the stat"></textarea>
         </label>
         <button type="submit">Save entry</button>
      </form>
   </section>
